<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login – NavMap</title>
<link rel="stylesheet" href="/css/main.css"/>
<style>
.auth-wrap {
  background:
    radial-gradient(ellipse 60% 40% at 30% 20%, rgba(200,241,53,.07) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(34,211,238,.05) 0%, transparent 50%),
    var(--bg);
}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <a class="auth-logo" href="/">
      <div class="logo-mark">N</div> NavMap
    </a>
    <h2>Welcome back</h2>
    <p class="auth-sub">Login to manage your floor plans and QR codes</p>
    <div class="err-box" id="err"></div>
    <div class="form-group">
      <label>Email address</label>
      <input class="form-control" type="email" id="email" placeholder="admin@organization.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" id="pass" placeholder="Your password"
        onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary w100" onclick="doLogin()" style="margin-top:4px">
      Login to Dashboard →
    </button>
    <p class="auth-switch" style="margin-top:18px">
      New to NavMap? <a href="/register">Create free account</a>
    </p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/js/utils.js"></script>
<script>
  if (getAuth().token) window.location.href = '/dashboard';
  async function doLogin() {
    document.getElementById('err').style.display = 'none';
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    if (!email || !pass) return showErr('err','Email and password required');
    try {
      const d = await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})});
      setAuth(d); window.location.href = '/dashboard';
    } catch(e) { showErr('err', e.message); }
  }
</script>
</body>
</html>
